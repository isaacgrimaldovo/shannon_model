seed: 42
device: auto  # auto | cpu | cuda

data:
  raw_dir: data/raw
  processed_dir: data/processed
  # Ajusta cuando tengáis el dataset real
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

model:
  name: shannon_baseline
  # Hiperparámetros placeholder — redefinir según la arquitectura final
  hidden_size: 256
  dropout: 0.1

train:
  epochs: 10
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  checkpoint_dir: checkpoints
  log_every: 10
  save_every_epoch: true
